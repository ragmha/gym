name: knip

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'src/**'
      - 'package.json'
      - 'bun.lock'
      - 'knip.yaml'
      - '.github/workflows/knip.yml'

concurrency:
  group: knip-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  knip:
    name: Dead-code report
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Non-blocking on purpose. Surfaces dead weight in PR summary; doesn't
      # fail the build until the team agrees to enforce rules.
      - name: Run knip
        id: knip
        continue-on-error: true
        run: bun run check:dead-code

      - name: Write summary
        if: always()
        env:
          OUTCOME: ${{ steps.knip.outcome }}
        run: |
          {
            echo "## knip"
            echo
            echo "- Result: \`${OUTCOME}\`"
            echo "- Re-run locally with: \`bun run check:dead-code\`"
            echo "- Configure exceptions in [knip.yaml](../blob/main/knip.yaml)"
          } >> "$GITHUB_STEP_SUMMARY"
