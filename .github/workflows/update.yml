name: update

on:
  push:
    branches: [main]

concurrency:
  group: production-update
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  update:
    name: EAS Update (Production)
    runs-on: ubuntu-latest
    steps:
      - name: Check for EXPO_TOKEN
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "::error::You must provide an EXPO_TOKEN secret. Learn more: https://docs.expo.dev/eas-update/github-actions"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Check for native changes
        id: fingerprint
        uses: expo/expo-github-action/fingerprint@main

      - name: Abort on native changes
        if: steps.fingerprint.outputs.fingerprint-diff != '[]'
        run: |
          echo "::error::Native changes detected — OTA update is unsafe. Trigger a new EAS Build instead."
          exit 1

      - name: Publish update
        run: eas update --auto
