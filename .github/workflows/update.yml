name: update

on:
  push:
    branches: [main]

concurrency:
  group: production-update
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  update:
    name: EAS Update (Production)
    runs-on: ubuntu-latest
    steps:
      - name: Check for EXPO_TOKEN
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "::error::You must provide an EXPO_TOKEN secret. Learn more: https://docs.expo.dev/eas-update/github-actions"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Check for native changes
        id: fingerprint
        uses: expo/expo-github-action/fingerprint@main

      - name: Trigger EAS Build on native changes
        if: steps.fingerprint.outputs.fingerprint-diff != '[]'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "::warning::Native changes detected — triggering EAS Build instead of OTA update."
          gh workflow run build.yml \
            --ref "$GITHUB_REF" \
            -f platform=all \
            -f profile=production
          echo "EAS Build triggered. Skipping OTA update."

      - name: Publish update
        if: steps.fingerprint.outputs.fingerprint-diff == '[]'
        run: eas update --auto
