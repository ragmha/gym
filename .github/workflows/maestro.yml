name: Maestro UI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ui-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        api-level: [34]
        target: [google_apis]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Prebuild Android project
        run: bunx expo prebuild --platform android --clean

      - name: Build Android app
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Set up Android Emulator and run tests
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: x86_64
          profile: pixel_6
          script: |
            MAESTRO_VERSION="1.36.0"
            MAESTRO_DIR="$HOME/.maestro"
            MAESTRO_BIN_DIR="$MAESTRO_DIR/bin"
            mkdir -p "$MAESTRO_BIN_DIR"
            curl -L "https://github.com/mobile-dev-inc/maestro/releases/download/cli-$MAESTRO_VERSION/maestro.zip" -o "$MAESTRO_DIR/maestro.zip"
            unzip -q -o "$MAESTRO_DIR/maestro.zip" -d "$MAESTRO_DIR"
            export PATH="$MAESTRO_BIN_DIR:$PATH"
            adb install android/app/build/outputs/apk/release/app-release.apk
            maestro test .maestro/flows/android

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: maestro-test-results
          path: ~/.maestro/tests
