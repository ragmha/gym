name: build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        type: choice
        options:
          - ios
          - android
          - all
        default: all
      profile:
        description: 'EAS build profile'
        type: choice
        options:
          - development
          - preview
          - production
        default: preview

jobs:
  build:
    name: EAS Build (${{ inputs.platform }} / ${{ inputs.profile }})
    runs-on: ubuntu-latest
    steps:
      - name: Check for EXPO_TOKEN
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "You must provide an EXPO_TOKEN secret linked to this project's Expo account in this repo's secrets."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: bun install

      - name: Run Expo Doctor
        run: bunx expo-doctor@latest

      - name: Build app
        run: bun run eas build --platform ${{ inputs.platform }} --profile ${{ inputs.profile }} --non-interactive
