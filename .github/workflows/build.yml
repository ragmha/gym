name: build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        type: choice
        options:
          - ios
          - android
          - all
        default: all
      profile:
        description: 'EAS build profile'
        type: choice
        options:
          - development
          - preview
          - production
        default: preview

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: EAS Build (${{ inputs.platform }} / ${{ inputs.profile }})
    runs-on: ubuntu-latest
    steps:
      - name: Check for EXPO_TOKEN
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "::error::You must provide an EXPO_TOKEN secret linked to this project's Expo account."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Run Expo Doctor
        run: bunx expo-doctor@latest

      - name: Build app
        run: eas build --platform ${{ inputs.platform }} --profile ${{ inputs.profile }} --non-interactive
